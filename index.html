(function(){
  var KEY='qtt_iqd_v1';
  var BASE='https://hjwxwxvqclyrkuvyzrcc.supabase.co/rest/v1/qtm_state';
  var AK='sb_publishable_VeFIASzc6TGceT3VOnHqLg_t2qLiBsn';
  var loaded=null;
  try{
    var x=new XMLHttpRequest();
    x.open('GET', BASE+'?id=eq.main&select=data', false);
    x.setRequestHeader('apikey',AK);
    x.setRequestHeader('Authorization','Bearer '+AK);
    x.send();
    if(x.status>=200 && x.status<300){
      var r=JSON.parse(x.responseText);
      if(r && r[0] && Array.isArray(r[0].data) && r[0].data.length){
        var j=JSON.stringify(r[0].data);
        try{ localStorage.setItem(KEY,j); loaded=j; }catch(e){}
      }
    }
  }catch(e){}
  var last = (loaded!==null) ? loaded : (function(){ try{ return localStorage.getItem(KEY); }catch(e){ return null; } })();
  function push(v){
    try{
      fetch(BASE+'?id=eq.main',{
        method:'PATCH',
        headers:{'apikey':AK,'Authorization':'Bearer '+AK,'Content-Type':'application/json','Prefer':'return=minimal'},
        body: JSON.stringify({data: JSON.parse(v), updated_at: new Date().toISOString()})
      }).catch(function(){});
    }catch(e){}
  }
  setInterval(function(){
    try{ var cur=localStorage.getItem(KEY); if(cur!==null && cur!==last){ last=cur; push(cur); } }catch(e){}
  },1500);
})();
</script>

">{{ cTotal }}<\u002Ftd>\n                  <td colspan=\"2\"><\u002Ftd>\n                <\u002Ftr>\n              <\u002Ftfoot>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isMaster }}\">\n      <div style=\"padding:28px 34px 60px;max-width:1320px;margin:0 auto;\">\n        <div style=\"margin-bottom:20px;\">\n          <h1 style=\"margin:0;font-size:25px;font-weight:700;letter-spacing:-.4px;\">Master Summary<\u002Fh1>\n          <div style=\"font-size:13px;color:#6b7a90;margin-top:5px;\">ملخص مركزي يجمع بيانات جميع الشركات تلقائياً<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:16px;margin-bottom:18px;\">\n          <div style=\"grid-column:span 6;background:#fff;border:1px solid #e4e9f0;border-radius:12px;padding:18px;\">\n            <div style=\"font-size:13.5px;font-weight:700;\">Expected Sales by Company<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa7ba;margin-bottom:14px;\">المبيعات المتوقعة حسب الشركة<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <sc-for list=\"{{ salesByCompany }}\" as=\"r\" hint-placeholder-count=\"10\">\n                <div style=\"display:flex;align-items:center;gap:11px;\">\n                  <div style=\"width:82px;flex:none;font-size:12px;color:#475569;\">{{ r.name }}<\u002Fdiv>\n                  <div style=\"flex:1;height:9px;background:#f0f3f8;border-radius:5px;overflow:hidden;\"><div style=\"height:100%;width:{{ r.w }}%;background:{{ r.color }};border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"width:96px;flex:none;text-align:right;font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;\">{{ r.valF }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"grid-column:span 6;background:#fff;border:1px solid #e4e9f0;border-radius:12px;padding:18px;\">\n            <div style=\"font-size:13.5px;font-weight:700;\">Forecast Coverage Ranking<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9aa7ba;margin-bottom:14px;\">ترتيب الشركات حسب تغطية الهدف<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <sc-for list=\"{{ ranking }}\" as=\"r\" hint-placeholder-count=\"10\">\n                <div style=\"display:flex;align-items:center;gap:11px;padding:7px 10px;border-radius:8px;background:#f9fafc;\">\n                  <div style=\"width:22px;height:22px;border-radius:50%;flex:none;background:{{ r.achBg }};color:{{ r.achColor }};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;\">{{ r.rank }}<\u002Fdiv>\n                  <div style=\"flex:1;font-size:12.5px;font-weight:500;color:#16263f;\">{{ r.name }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#6b7a90;font-variant-numeric:tabular-nums;\">{{ r.valF }}<\u002Fdiv>\n                  <div style=\"width:50px;text-align:right;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;color:{{ r.achColor }};\">{{ r.achLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid #e4e9f0;border-radius:12px;overflow:hidden;\">\n          <div style=\"padding:14px 18px;border-bottom:1px solid #eef1f6;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;\">\n            <div>\n              <div style=\"font-size:14px;font-weight:700;\">All Products · جميع المواد<\u002Fdiv>\n              <div style=\"font-size:11px;color:#9aa7ba;\">{{ masterCount }} منتج عبر جميع الشركات<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:center;\">\n              <select value=\"{{ mCompany }}\" onchange=\"{{ onMCompany }}\" style=\"border:1px solid #d8e0ea;border-radius:8px;padding:8px 12px;font:inherit;font-size:12.5px;outline:none;background:#fff;color:#16263f;\">\n                \n                  <option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption>\n                \n              <\u002Fselect>\n              <input value=\"{{ mSearch }}\" oninput=\"{{ onMSearch }}\" placeholder=\"Search…\" style-focus=\"border-color:#1e5eb8;box-shadow:0 0 0 3px rgba(30,94,184,0.12)\" style=\"border:1px solid #d8e0ea;border-radius:8px;padding:8px 12px;font-size:12.5px;outline:none;width:170px;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"overflow-x:auto;max-height:560px;overflow-y:auto;\">\n            <sc-for list=\"{{ masterRows }}\" as=\"r\" hint-placeholder-count=\"15\">\n                  <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px;\">\n              <thead>\n                <tr style=\"background:#f7f9fc;\">\n                  <th style=\"text-align:left;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Company<\u002Fth>\n                  <th style=\"text-align:left;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Product<\u002Fth>\n                  <th style=\"text-align:right;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Unit Price<\u002Fth>\n                  <th style=\"text-align:right;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Target U<\u002Fth>\n                  <th style=\"text-align:right;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Expected U<\u002Fth>\n                  <th style=\"text-align:right;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Expected Value<\u002Fth>\n                  <th style=\"text-align:right;padding:11px 16px;font-size:10.5px;font-weight:600;color:#6b7a90;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e4e9f0;position:sticky;top:0;background:#f7f9fc;\">Fcst %<\u002Fth>\n                <\u002Ftr>\n              <\u002Fthead>\n              <tbody>\n                <tr style-hover=\"background:#f7faff\" style=\"border-bottom:1px solid #f1f4f8;\">\n                    <td style=\"padding:9px 16px;color:#6b7a90;\">{{ r.company }}<\u002Ftd>\n                    <td style=\"padding:9px 16px;font-weight:500;color:#16263f;\">{{ r.name }}<\u002Ftd>\n                    <td style=\"padding:9px 16px;text-align:right;font-variant-numeric:tabular-nums;color:#475569;\">{{ r.priceF }}<\u002Ftd>\n                    <td style=\"padding:9px 16px;text-align:right;font-variant-numeric:tabular-nums;color:#475569;\">{{ r.targetU }}<\u002Ftd>\n                    <td style=\"padding:9px 16px;text-align:right;font-variant-numeric:tabular-nums;color:#475569;\">{{ r.actualU }}<\u002Ftd>\n                    <td style=\"padding:9px 16px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:#16263f;\">{{ r.actualValueF }}<\u002Ftd>\n                    <td style=\"padding:9px 16px;text-align:right;\"><span style=\"display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;background:{{ r.achBg }};color:{{ r.achColor }};\">{{ r.achLabel }}<\u002Fspan><\u002Ftd>\n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot;},\n  &quot;currencyLabel&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;IQD&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;quarterLabel&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Q3 · 2026&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;greenThreshold&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 90, &quot;min&quot;: 50, &quot;max&quot;: 100, &quot;tsType&quot;: &quot;number&quot;},\n  &quot;yellowThreshold&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 70, &quot;min&quot;: 0, &quot;max&quot;: 99, &quot;tsType&quot;: &quot;number&quot;}\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.KEY = 'qtt_iqd_v1';\n    this.TOTAL = 300000000;\n    this.shares = [0.16,0.14,0.12,0.11,0.10,0.09,0.08,0.08,0.07,0.05];\n    this.palette = ['#0f2747','#16447a','#1e5eb8','#2f7ad1','#5b9bd5','#0e7490','#0891b2','#155e75','#1d4ed8','#3b82c4'];\n    this.state = { view:'dashboard', companies: this.load(), search:'', mSearch:'', mCompany:'all', editNames:false };\n  }\n\n  load(){\n    try{ const raw = localStorage.getItem(this.KEY); if(raw){ const d = JSON.parse(raw); if(Array.isArray(d) && d.length) return d; } }catch(e){}\n    return this.build();\n  }\n  save(){ try{ localStorage.setItem(this.KEY, JSON.stringify(this.state.companies)); }catch(e){} }\n\n  build(){\n    const rnd = () => Math.random();\n    const companies = [];\n    let allocated = 0;\n    for(let ci=0; ci<10; ci++){\n      const target = ci===9 ? (this.TOTAL - allocated) : Math.round(this.TOTAL * this.shares[ci]);\n      allocated += target;\n      const mt0 = Math.round(target*0.30), mt1 = Math.round(target*0.35);\n      const monthTargets = [mt0, mt1, target - mt0 - mt1];\n      const nProd = 15;\n      const weights = []; let wsum = 0;\n      for(let i=0;i<nProd;i++){ const w = 0.5 + rnd(); weights.push(w); wsum += w; }\n      let alloc = 0;\n      const products = [];\n      for(let i=0;i<nProd;i++){\n        const unitPrice = (10 + Math.floor(rnd()*490)) * 500;\n        const tv = i===nProd-1 ? (target - alloc) : Math.round(target * weights[i] / wsum);\n        alloc += tv;\n        const targetUnits = Math.max(1, Math.round(tv / unitPrice));\n        const ach = 0.55 + rnd()*0.5;\n        const tot = Math.max(0, Math.round(targetUnits * ach));\n        const m1 = Math.round(tot * (0.28 + rnd()*0.1));\n        const m2 = Math.round(tot * (0.30 + rnd()*0.1));\n        const m3 = Math.max(0, tot - m1 - m2);\n        products.push({ id:'c'+ci+'p'+i, name:'Product '+(i+1), unitPrice, targetUnits, m1Units:m1, m2Units:m2, m3Units:m3 });\n      }\n      companies.push({ name:'Company '+(ci+1), target, monthTargets, products });\n    }\n    return companies;\n  }\n\n  setView(v){ this.setState({ view:v, search:'' }); }\n  onSearchChange(e){ this.setState({ search: e.target.value }); }\n  onMSearchChange(e){ this.setState({ mSearch: e.target.value }); }\n  onMCompanyChange(e){ this.setState({ mCompany: e.target.value }); }\n\n  update(ci, pi, field, raw){\n    const val = raw === '' ? 0 : Math.max(0, Math.floor(Number(raw) || 0));\n    this.setState(s => ({ companies: s.companies.map((c,i)=> i!==ci ? c : { ...c, products: c.products.map((p,j)=> j!==pi ? p : { ...p, [field]: val }) }) }), ()=>this.save());\n  }\n  updateText(ci, pi, field, val){\n    this.setState(s => ({ companies: s.companies.map((c,i)=> i!==ci ? c : { ...c, products: c.products.map((p,j)=> j!==pi ? p : { ...p, [field]: val }) }) }), ()=>this.save());\n  }\n  addProduct(ci){\n    this.setState(s => ({ companies: s.companies.map((c,i)=>{ if(i!==ci) return c; const n = c.products.length+1; return { ...c, products:[...c.products, { id:'c'+ci+'p'+Date.now(), name:'Product '+n, unitPrice:0, targetUnits:0, m1Units:0, m2Units:0, m3Units:0 }] }; }) }), ()=>this.save());\n  }\n  removeProduct(ci, pi){\n    this.setState(s => ({ companies: s.companies.map((c,i)=> i!==ci ? c : { ...c, products: c.products.filter((p,j)=> j!==pi) }) }), ()=>this.save());\n  }\n  clearActuals(){\n    this.setState(s => ({ companies: s.companies.map(c => ({ ...c, products: c.products.map(p => ({ ...p, m1Units:0, m2Units:0, m3Units:0 })) })) }), ()=>this.save());\n  }\n  resetSample(){ this.setState({ companies: this.build() }, ()=>this.save()); }\n  toggleEditNames(){ this.setState(s => ({ editNames: !s.editNames })); }\n  updateCompanyName(ci, val){ this.setState(s => ({ companies: s.companies.map((c,i)=> i!==ci ? c : { ...c, name: val }) }), ()=>this.save()); }\n\n  fmt(n){ return Math.round(n||0).toLocaleString('en-US'); }\n  short(n){ const a = Math.abs(n||0); const s = (n<0?'-':''); if(a>=1e9) return s+(a/1e9).toFixed(a/1e9>=100?0:1)+'B'; if(a>=1e6) return s+(a/1e6).toFixed(a/1e6>=100?0:1)+'M'; if(a>=1e3) return s+(a/1e3).toFixed(0)+'K'; return s+Math.round(a); }\n\n  achStyle(pct){\n    const g = (this.props.greenThreshold ?? 90)/100;\n    const y = (this.props.yellowThreshold ?? 70)/100;\n    const label = Math.round(pct*100)+'%';\n    if(pct >= g) return { bg:'#e7f6ec', color:'#15803d', dot:'#16a34a', label };\n    if(pct >= y) return { bg:'#fbf1d9', color:'#b45309', dot:'#d97706', label };\n    return { bg:'#fbe7e7', color:'#b91c1c', dot:'#dc2626', label };\n  }\n\n  enrich(){\n    const companies = this.state.companies.map((c, ci) => {\n      const products = c.products.map((p, pi) => {\n        const targetValue = p.unitPrice * p.targetUnits;\n        const m1v = p.unitPrice * p.m1Units, m2v = p.unitPrice * p.m2Units, m3v = p.unitPrice * p.m3Units;\n        const totalUnits = p.m1Units + p.m2Units + p.m3Units;\n        const totalValue = m1v + m2v + m3v;\n        const ach = targetValue > 0 ? totalValue / targetValue : 0;\n        return { ...p, ci, pi, targetValue, m1v, m2v, m3v, totalUnits, totalValue, ach };\n      });\n      const actual = products.reduce((s,p)=>s+p.totalValue,0);\n      const m1 = products.reduce((s,p)=>s+p.m1v,0);\n      const m2 = products.reduce((s,p)=>s+p.m2v,0);\n      const m3 = products.reduce((s,p)=>s+p.m3v,0);\n      const units = products.reduce((s,p)=>s+p.totalUnits,0);\n      const ach = c.target > 0 ? actual / c.target : 0;\n      return { ...c, ci, products, actual, m1, m2, m3, units, remaining: c.target - actual, ach };\n    });\n    const totalTarget = companies.reduce((s,c)=>s+c.target,0);\n    const totalActual = companies.reduce((s,c)=>s+c.actual,0);\n    const totalUnits = companies.reduce((s,c)=>s+c.units,0);\n    return { companies, totalTarget, totalActual, totalUnits, remaining: totalTarget-totalActual, ach: totalTarget ? totalActual/totalTarget : 0 };\n  }\n\n  renderVals(){\n    const cur = this.props.currencyLabel ?? 'IQD';\n    const money = n => this.fmt(n) + ' ' + cur;\n    const moneyS = n => this.short(n) + ' ' + cur;\n    const E = this.enrich();\n    const view = this.state.view;\n    const isCompany = view.indexOf('company-') === 0;\n    const isMaster = view === 'master';\n    const isDashboard = !isCompany && !isMaster;\n\n    const activeBg = '#1e5eb8', activeCol = '#fff', idleBg = 'transparent', idleCol = '#cdd8e8';\n    const nav = E.companies.map((c, i) => {\n      const key = 'company-'+i; const active = view === key; const a = this.achStyle(c.ach);\n      return { name: c.name, ach: a.label, dot: a.dot, active, inactive: !active, go: () => this.setView(key) };\n    });\n\n    const kAchS = this.achStyle(E.ach);\n\n    // dashboard tables/charts\n    const summaryRows = E.companies.map((c,i) => {\n      const a = this.achStyle(c.ach);\n      return { name: c.name, targetF: this.fmt(c.target), m1F: this.fmt(c.monthTargets[0]), m2F: this.fmt(c.monthTargets[1]), m3F: this.fmt(c.monthTargets[2]),\n        actualF: this.fmt(c.actual), remainingF: this.fmt(c.remaining), achLabel: a.label, achBg: a.bg, achColor: a.color,\n        onName: e => this.updateCompanyName(i, e.target.value), go: () => this.setView('company-'+i) };\n    });\n\n    const maxTA = Math.max(1, ...E.companies.map(c => Math.max(c.target, c.actual)));\n    const tvaRows = E.companies.map(c => ({ name: c.name, tW: c.target/maxTA*100, aW: c.actual/maxTA*100, label: this.short(c.actual)+' / '+this.short(c.target) }));\n\n    const totA = E.totalActual || 1; let acc = 0; const segs = []; const donutLegend = [];\n    E.companies.forEach((c,i) => {\n      const pct = c.actual / totA; const start = acc*360; acc += pct; const end = acc*360; const col = this.palette[i % this.palette.length];\n      segs.push(col+' '+start.toFixed(2)+'deg '+end.toFixed(2)+'deg');\n      donutLegend.push({ name: c.name, color: col, pctLabel: (pct*100).toFixed(1)+'%' });\n    });\n    const donutGradient = 'conic-gradient(' + segs.join(',') + ')';\n\n    const mt = [E.companies.reduce((s,c)=>s+c.m1,0), E.companies.reduce((s,c)=>s+c.m2,0), E.companies.reduce((s,c)=>s+c.m3,0)];\n    const maxM = Math.max(1, ...mt);\n    const monthBars = [\n      { label:'Month 1', valShort:this.short(mt[0]), h: mt[0]/maxM*100 },\n      { label:'Month 2', valShort:this.short(mt[1]), h: mt[1]/maxM*100 },\n      { label:'Month 3', valShort:this.short(mt[2]), h: mt[2]/maxM*100 },\n    ];\n\n    const topCompanies = [...E.companies].sort((a,b)=>b.ach-a.ach).slice(0,5).map((c,i) => {\n      const a = this.achStyle(c.ach); return { rank:i+1, name:c.name, achLabel:a.label, color:a.color, w: Math.min(100, c.ach*100) };\n    });\n\n    const allProducts = [];\n    E.companies.forEach(c => c.products.forEach(p => allProducts.push({ name:p.name, company:c.name, value:p.totalValue })));\n    const maxPV = Math.max(1, ...allProducts.map(p=>p.value));\n    const topProducts = [...allProducts].sort((a,b)=>b.value-a.value).slice(0,8).map((p,i) => ({ rank:i+1, name:p.name, company:p.company, valF: moneyS(p.value), w: p.value/maxPV*100 }));\n\n    const gaugeDash = (2*Math.PI*56);\n    const gaugeOffset = gaugeDash * (1 - Math.min(1, E.ach));\n\n    // current company\n    let cName='', cTarget='', cM1='', cM2='', cM3='', cTotal='', cRemaining='', cUnits='', cAchLabel='', cAchBg='', cAchColor='', curRows=[];\n    let cfTargetU=0, cfTargetV='', cfM1U=0, cfM2U=0, cfM3U=0;\n    if(isCompany){\n      const ci = parseInt(view.split('-')[1], 10);\n      const c = E.companies[ci];\n      if(c){\n        const a = this.achStyle(c.ach);\n        cName = c.name; cTarget = money(c.target); cM1 = this.fmt(c.m1); cM2 = this.fmt(c.m2); cM3 = this.fmt(c.m3);\n        cTotal = money(c.actual); cRemaining = money(c.remaining); cUnits = this.fmt(c.units);\n        cAchLabel = a.label; cAchBg = a.bg; cAchColor = a.color;\n        const q = (this.state.search||'').toLowerCase();\n        let tU=0, tV=0, m1u=0, m2u=0, m3u=0;\n        c.products.forEach(p => { tU+=p.targetUnits; tV+=p.targetValue; m1u+=p.m1Units; m2u+=p.m2Units; m3u+=p.m3Units; });\n        cfTargetU = this.fmt(tU); cfTargetV = this.fmt(tV); cfM1U = this.fmt(m1u); cfM2U = this.fmt(m2u); cfM3U = this.fmt(m3u);\n        curRows = c.products.filter(p => !q || p.name.toLowerCase().indexOf(q) !== -1).map(p => {\n          const pa = this.achStyle(p.ach);\n          return {\n            name: p.name, priceVal: p.unitPrice, targetUnitsVal: p.targetUnits, targetValueF: this.fmt(p.targetValue),\n            m1Val: p.m1Units, m1ValueF: this.fmt(p.m1v), m2Val: p.m2Units, m2ValueF: this.fmt(p.m2v), m3Val: p.m3Units, m3ValueF: this.fmt(p.m3v),\n            totalUnits: this.fmt(p.totalUnits), totalValueF: this.fmt(p.totalValue), achLabel: pa.label, achBg: pa.bg, achColor: pa.color,\n            onName: e => this.updateText(ci, p.pi, 'name', e.target.value),\n            onPrice: e => this.update(ci, p.pi, 'unitPrice', e.target.value),\n            onTarget: e => this.update(ci, p.pi, 'targetUnits', e.target.value),\n            onM1: e => this.update(ci, p.pi, 'm1Units', e.target.value),\n            onM2: e => this.update(ci, p.pi, 'm2Units', e.target.value),\n            onM3: e => this.update(ci, p.pi, 'm3Units', e.target.value),\n            onDel: () => this.removeProduct(ci, p.pi),\n          };\n        });\n      }\n    }\n\n    // master\n    const maxCA = Math.max(1, ...E.companies.map(c=>c.actual));\n    const salesByCompany = E.companies.map((c,i) => ({ name:c.name, valF: moneyS(c.actual), w: c.actual/maxCA*100, color: this.palette[i % this.palette.length] }));\n    const ranking = [...E.companies].sort((a,b)=>b.ach-a.ach).map((c,i) => { const a = this.achStyle(c.ach); return { rank:i+1, name:c.name, valF: moneyS(c.actual), achLabel:a.label, achBg:a.bg, achColor:a.color }; });\n    const companyOptions = [{ value:'all', label:'All Companies · كل الشركات' }, ...E.companies.map(c => ({ value:c.name, label:c.name }))];\n    const mq = (this.state.mSearch||'').toLowerCase(); const mc = this.state.mCompany;\n    const masterRows = [];\n    E.companies.forEach(c => { if(mc!=='all' && c.name!==mc) return; c.products.forEach(p => {\n      if(mq && c.name.toLowerCase().indexOf(mq)===-1 && p.name.toLowerCase().indexOf(mq)===-1) return;\n      const a = this.achStyle(p.ach);\n      masterRows.push({ company:c.name, name:p.name, priceF:this.fmt(p.unitPrice), targetU:this.fmt(p.targetUnits), actualU:this.fmt(p.totalUnits), actualValueF:this.fmt(p.totalValue), achLabel:a.label, achBg:a.bg, achColor:a.color });\n    }); });\n\n    return {\n      view, isDashboard, isCompany, isMaster,\n      nav,\n      dashActive: isDashboard, dashInactive: !isDashboard,\n      masterActive: isMaster, masterInactive: !isMaster,\n      goDashboard: () => this.setView('dashboard'), goMaster: () => this.setView('master'),\n      onClear: () => this.clearActuals(), onReset: () => this.resetSample(),\n      editNames: this.state.editNames, notEditNames: !this.state.editNames,\n      onToggleNames: () => this.toggleEditNames(), stop: e => e.stopPropagation(),\n      quarterLabel: this.props.quarterLabel ?? 'Q3 · 2026',\n      kTarget: moneyS(E.totalTarget), kActual: moneyS(E.totalActual), kRemaining: moneyS(E.remaining),\n      kAch: Math.round(E.ach*100)+'%', kUnits: this.fmt(E.totalUnits), kCompanies: String(E.companies.length),\n      kTargetFull: money(E.totalTarget), kActualFull: money(E.totalActual), kRemainingFull: money(E.remaining),\n      kAchColor: kAchS.color, kAchBg: kAchS.bg,\n      gaugeDash, gaugeOffset,\n      summaryRows, tM1: this.fmt(E.companies.reduce((s,c)=>s+c.monthTargets[0],0)), tM2: this.fmt(E.companies.reduce((s,c)=>s+c.monthTargets[1],0)), tM3: this.fmt(E.companies.reduce((s,c)=>s+c.monthTargets[2],0)),\n      tvaRows, donutGradient, donutLegend, monthBars, topCompanies, topProducts,\n      search: this.state.search, onSearch: e => this.onSearchChange(e),\n      cName, cTarget, cM1, cM2, cM3, cTotal, cRemaining, cUnits, cAchLabel, cAchBg, cAchColor, curRows,\n      cfTargetU, cfTargetV, cfM1U, cfM2U, cfM3U,\n      onAdd: () => { const ci = parseInt(view.split('-')[1],10); this.addProduct(ci); },\n      salesByCompany, ranking, companyOptions, masterRows, masterCount: String(masterRows.length),\n      mCompany: this.state.mCompany, mSearch: this.state.mSearch,\n      onMCompany: e => this.onMCompanyChange(e), onMSearch: e => this.onMSearchChange(e),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Quarter Target Manager.dc"}
